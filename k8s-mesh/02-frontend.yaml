apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ecommerce-mesh
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      imagePullSecrets:
      - name: acr-secret
      containers:
      - name: web
        image: haiwebappregistry.azurecr.io/ecommerce-frontend:v2
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: ecommerce-mesh
spec:
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
